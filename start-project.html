<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Universal Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<meta name="theme-color" content="#ffffff">

<title>Start Your Project | SLIUBAR</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:
radial-gradient(circle at 20% 20%, rgba(99,102,241,.12), transparent),
#F8FAFC;
margin:0;
color:#0F172A;
}

.container{
width:92%;
max-width:1100px;
margin:auto;
}

header{
position:sticky;
top:0;
background:rgba(255,255,255,.8);
backdrop-filter:blur(18px);
border-bottom:1px solid #E2E8F0;
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:22px 0;
}

.logo{
font-weight:800;
letter-spacing:4px;
text-decoration:none;
color:inherit;
}

.nav-links{
display:flex;
gap:25px;
margin-left:auto;
}

.nav-links a{
font-size:14px;
color:#64748B;
text-decoration:none;
}

.nav-links a:hover{
color:#0F172A;
}

.page-content{
min-height:calc(100vh - 90px);
display:flex;
justify-content:center;
align-items:center;
padding:30px 0;
}

/* CARD */
.card{
width:520px;
max-width:92%;
background:white;
padding:45px;
border-radius:22px;
box-shadow:0 30px 80px rgba(0,0,0,.08);
}

/* PROGRESS */
.progress{
height:6px;
background:#E2E8F0;
border-radius:10px;
margin-bottom:30px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:33%;
background:linear-gradient(90deg,#2563EB,#6366F1);
transition:.4s;
}

/* STEPS */
.step{display:none;}
.step.active{display:block;}

h2{margin-bottom:20px;}

input,select,textarea{
width:100%;
padding:14px;
margin-top:15px;
border-radius:10px;
border:1px solid #E2E8F0;
font-size:15px;
}

textarea{resize:vertical;}

.buttons{
margin-top:30px;
display:flex;
justify-content:space-between;
}

button{
padding:14px 26px;
border:none;
border-radius:40px;
cursor:pointer;
font-weight:600;
}

.next{
background:linear-gradient(90deg,#2563EB,#6366F1);
color:white;
}

.back{
background:#F1F5F9;
}

.success{
text-align:center;
display:none;
}

@media(max-width:768px){
nav{
flex-direction:row;
align-items:center;
gap:12px;
}

.nav-links{
margin-left:auto;
max-width:72%;
overflow-x:auto;
white-space:nowrap;
gap:14px;
padding-bottom:0;
justify-content:flex-end;
}

.nav-links a{
font-size:13px;
}
}

</style>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
emailjs.init("7H6amj8MZkwqkpdxf");
</script>

</head>

<body>

<header>
<div class="container">
<nav>
<a href="index.html" class="logo">SLIUBAR</a>
<div class="nav-links">
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="work.html">Demos</a>
<a href="index.html#contact">Contact</a>
</div>
</nav>
</div>
</header>

<main class="page-content">

<div class="card">

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<form id="projectForm">

<!-- STEP 1 -->
<div class="step active">
<h2>About You</h2>

<input name="name" required placeholder="Your Name">
<input name="email" type="email" required placeholder="Email">
<input name="phone" required placeholder="Phone Number">

<div class="buttons">
<button type="button" class="next" onclick="nextStep()">Next</button>
</div>
</div>

<!-- STEP 2 -->
<div class="step">
<h2>Your Project</h2>

<input name="company" placeholder="Company / Brand">

<select name="project" required>
<option value="">Project Type</option>
<option>Mobile App</option>
<option>AI System</option>
<option>Web Platform</option>
<option>Automation</option>
</select>

<div class="buttons">
<button type="button" class="back" onclick="prevStep()">Back</button>
<button type="button" class="next" onclick="nextStep()">Next</button>
</div>
</div>

<!-- STEP 3 -->
<div class="step">
<h2>Budget & Details</h2>

<select name="budget" required>
<option value="">Estimated Budget (AED)</option>
<option>10,000 – 25,000 AED</option>
<option>25,000 – 60,000 AED</option>
<option>60,000 – 120,000 AED</option>
<option>120,000 – 250,000 AED</option>
<option>250,000+ AED</option>
<option>Not sure yet</option>
</select>

<textarea name="message"
placeholder="Describe your project"></textarea>

<div class="buttons">
<button type="button" class="back" onclick="prevStep()">Back</button>
<button type="submit" class="next" id="submitBtn">
Submit
</button>
</div>
</div>

</form>

<div class="success" id="successMessage">
<h2>✅ Request Sent</h2>
<p>We’ll contact you shortly.</p>
</div>

</div>

</main>

<script>

let currentStep=0;
const steps=document.querySelectorAll(".step");
const progress=document.getElementById("progressBar");

function showStep(){

steps.forEach((step,i)=>{

step.classList.toggle("active",i===currentStep);

/* MOBILE SAFE */
step.querySelectorAll("input,select,textarea")
.forEach(input=>{
i===currentStep
?input.removeAttribute("disabled")
:input.setAttribute("disabled","true");
});

});

progress.style.width=((currentStep+1)/steps.length*100)+"%";
}

function nextStep(){
currentStep++;
showStep();
}

function prevStep(){
currentStep--;
showStep();
}

showStep();

/* SUBMIT */

document.getElementById("projectForm")
.addEventListener("submit",function(e){

e.preventDefault();

const btn=document.getElementById("submitBtn");
btn.disabled=true;
btn.innerText="Sending...";

const f=this;

emailjs.send(
"service_bojhf7q",
"template_mpnzyvl",
{
name:f.name.value,
email:f.email.value,
phone:f.phone.value,
company:f.company.value,
project:f.project.value,
budget:f.budget.value,
message:f.message.value
}
).then(()=>{

f.style.display="none";
document.getElementById("successMessage").style.display="block";

}).catch(()=>{
alert("Submission failed");
btn.disabled=false;
btn.innerText="Submit";
});

});

</script>

</body>
</html>
