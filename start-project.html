<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Start Your Project | SLIUBAR</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:
radial-gradient(circle at 20% 20%, rgba(99,102,241,.12), transparent),
#F8FAFC;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:#0F172A;
}

.card{
width:520px;
max-width:92%;
background:white;
padding:45px;
border-radius:22px;
box-shadow:0 30px 80px rgba(0,0,0,.08);
}

.progress{
height:6px;
background:#E2E8F0;
border-radius:10px;
margin-bottom:30px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:33%;
background:linear-gradient(90deg,#2563EB,#6366F1);
transition:.4s;
}

.step{display:none;}
.step.active{display:block;}

h2{
font-size:28px;
margin-bottom:20px;
}

input,select,textarea{
width:100%;
padding:14px;
margin-top:15px;
border-radius:10px;
border:1px solid #E2E8F0;
font-size:15px;
font-family:Inter;
}

textarea{resize:vertical;}

.buttons{
margin-top:30px;
display:flex;
justify-content:space-between;
}

button{
padding:14px 26px;
border:none;
border-radius:40px;
cursor:pointer;
font-weight:600;
font-family:Inter;
}

.next{
background:linear-gradient(90deg,#2563EB,#6366F1);
color:white;
}

.back{
background:#F1F5F9;
}

.success{
display:none;
text-align:center;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
window.onload=()=>emailjs.init("7H6amj8MZkwqkpdxf");
</script>

</head>

<body>

<div class="card">

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<form id="projectForm">

<!-- STEP 1 -->
<div class="step active">
<h2>About You</h2>

<input name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="tel" name="phone" placeholder="Phone Number" required>

<div class="buttons">
<button type="button" class="next" onclick="nextStep()">Next</button>
</div>
</div>

<!-- STEP 2 -->
<div class="step">
<h2>Your Project</h2>

<input name="company" placeholder="Company / Brand">

<select name="project" required>
<option value="">Project Type</option>
<option>Mobile App</option>
<option>AI System</option>
<option>Web Platform</option>
<option>Automation</option>
</select>

<div class="buttons">
<button type="button" class="back" onclick="prevStep()">Back</button>
<button type="button" class="next" onclick="nextStep()">Next</button>
</div>
</div>

<!-- STEP 3 -->
<div class="step">
<h2>Budget & Details</h2>

<select name="budget" required>
<option value="">Estimated Budget</option>
<option>15,000 – 30,000 AED</option>
<option>30,000 – 75,000 AED</option>
<option>75,000 – 150,000 AED</option>
<option>150,000 – 300,000 AED</option>
<option>300,000+ AED</option>
<option>Not sure yet</option>
</select>

<textarea name="message" rows="4"
placeholder="Describe your project"></textarea>

<div class="buttons">
<button type="button" class="back" onclick="prevStep()">Back</button>
<button type="submit" class="next" id="submitBtn">
Submit
</button>
</div>
</div>

</form>

<div class="success" id="successMessage">
<h2>✓ Request Sent</h2>
<p>We’ll contact you shortly.</p>
</div>

</div>

<script>

let currentStep=0;
const steps=document.querySelectorAll(".step");
const progress=document.getElementById("progressBar");

function showStep(){
steps.forEach((step,i)=>{
step.classList.toggle("active",i===currentStep);

step.querySelectorAll("input,select,textarea")
.forEach(input=>{
i===currentStep
?input.removeAttribute("disabled")
:input.setAttribute("disabled","true");
});
});
progress.style.width=((currentStep+1)/steps.length*100)+"%";
}

function nextStep(){currentStep++;showStep();}
function prevStep(){currentStep--;showStep();}
showStep();

document.getElementById("projectForm")
.addEventListener("submit",function(e){

e.preventDefault();

const btn=document.getElementById("submitBtn");
btn.disabled=true;
btn.innerText="Sending...";

<script>

document.getElementById("projectForm")
.addEventListener("submit",function(e){

e.preventDefault();

const btn=document.getElementById("submitBtn");
btn.disabled=true;
btn.innerText="Sending...";

const formData={
name:this.name.value,
email:this.email.value,
phone:this.phone.value,
company:this.company.value,
project:this.project.value,
budget:this.budget.value,
message:this.message.value
};

emailjs.send(
"service_bojhf7q",
"template_mpnzyvl",
formData
).then(()=>{

document.getElementById("projectForm").style.display="none";
document.getElementById("successMessage").style.display="block";

}).catch(()=>{
alert("Failed to send");
btn.disabled=false;
btn.innerText="Submit";
});

});


</script>

</body>
</html>
