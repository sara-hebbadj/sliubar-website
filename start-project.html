<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Start Your Project | SLIUBAR</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:#F8FAFC;
margin:0;
color:#0F172A;
}

.container{
max-width:700px;
margin:auto;
padding:60px 20px;
}

h1{text-align:center;}
p{
text-align:center;
color:#64748B;
margin-bottom:40px;
}

form{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,.05);
}

label{
display:block;
margin-top:20px;
font-weight:600;
}

input,textarea,select{
width:100%;
padding:14px;
margin-top:8px;
border-radius:10px;
border:1px solid #E2E8F0;
font-size:15px;
}

button{
margin-top:30px;
width:100%;
padding:16px;
border:none;
border-radius:40px;
background:linear-gradient(90deg,#2563EB,#6366F1);
color:white;
font-weight:600;
cursor:pointer;
}

.success{
margin-top:20px;
color:green;
text-align:center;
display:none;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
window.onload=function(){
emailjs.init("7H6amj8MZkwqkpdxf");
};
</script>

</head>

<body>

<div class="container">

<h1>Start Your Project</h1>
<p>Tell us about your idea. We'll review and contact you shortly.</p>

<form id="projectForm">

<label>Your Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Phone Number</label>
<input type="tel" name="phone" required>

<label>Company / Brand</label>
<input type="text" name="company">

<label>Project Type</label>
<select name="project" required>
<option>Mobile App</option>
<option>AI System</option>
<option>Web Platform</option>
<option>Automation</option>
</select>

<label>Estimated Budget</label>
<select name="budget" required>
<option>Under $5,000</option>
<option>$5,000 – $15,000</option>
<option>$15,000 – $50,000</option>
<option>$50,000+</option>
</select>

<label>Project Description</label>
<textarea name="message" rows="5" required></textarea>

<button type="submit" id="submitBtn">
Submit Project Request
</button>

</form>

<p id="successMessage" class="success">
✅ Project request sent successfully!
</p>

</div>

<script>

const form=document.getElementById("projectForm");
const btn=document.getElementById("submitBtn");

form.addEventListener("submit",function(e){

e.preventDefault();

btn.disabled=true;
btn.innerText="Sending...";

emailjs.sendForm(
"service_bojhf7q",
"template_mpnzyvl",
this
).then(function(){

document.getElementById("successMessage").style.display="block";
form.reset();

btn.disabled=false;
btn.innerText="Submit Project Request";

});

});

</script>

</body>
</html>
