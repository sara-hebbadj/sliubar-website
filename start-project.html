<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Start Your Project | SLIUBAR</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
background:radial-gradient(circle at 20% 20%,rgba(99,102,241,.12),transparent),#F8FAFC;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
width:520px;
max-width:92%;
background:white;
padding:45px;
border-radius:22px;
box-shadow:0 30px 80px rgba(0,0,0,.08);
}

.step{display:none;}
.step.active{display:block;}

h2{font-size:28px;margin-bottom:20px;}

input,select,textarea{
width:100%;
padding:14px;
margin-top:15px;
border-radius:10px;
border:1px solid #E2E8F0;
font-size:15px;
}

.buttons{
margin-top:30px;
display:flex;
justify-content:space-between;
}

button{
padding:14px 26px;
border:none;
border-radius:40px;
font-weight:600;
cursor:pointer;
}

.next{
background:linear-gradient(90deg,#2563EB,#6366F1);
color:white;
}

.success{display:none;text-align:center;}
</style>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
emailjs.init("7H6amj8MZkwqkpdxf");
</script>

</head>

<body>

<div class="card">

<form id="projectForm">

<div class="step active">
<h2>About You</h2>
<input name="name" placeholder="Your Name" required>
<input name="email" type="email" placeholder="Email" required>
<input name="phone" placeholder="Phone Number" required>

<div class="buttons">
<button type="button" class="next" onclick="nextStep()">Next</button>
</div>
</div>

<div class="step">
<h2>Your Project</h2>
<input name="company" placeholder="Company">
<select name="project" required>
<option value="">Project Type</option>
<option>Mobile App</option>
<option>AI System</option>
<option>Web Platform</option>
<option>Automation</option>
</select>

<div class="buttons">
<button type="button" onclick="prevStep()">Back</button>
<button type="button" class="next" onclick="nextStep()">Next</button>
</div>
</div>

<div class="step">
<h2>Budget & Details</h2>

<select name="budget">
<option>15k–30k AED</option>
<option>30k–75k AED</option>
<option>75k–150k AED</option>
<option>150k+ AED</option>
</select>

<textarea name="message" placeholder="Describe project"></textarea>

<div class="buttons">
<button type="button" onclick="prevStep()">Back</button>
<button type="submit" class="next">Submit</button>
</div>
</div>

</form>

<div class="success" id="success">
<h2>✅ Request Sent</h2>
</div>

</div>

<script>

let step=0;
const steps=document.querySelectorAll(".step");

function show(){
steps.forEach((s,i)=>s.classList.toggle("active",i===step));
}
function nextStep(){step++;show();}
function prevStep(){step--;show();}

document.getElementById("projectForm")
.addEventListener("submit",e=>{

e.preventDefault();

const f=e.target;

emailjs.send(
"service_bojhf7q",
"template_mpnzyvl",
{
name:f.name.value,
email:f.email.value,
phone:f.phone.value,
company:f.company.value,
project:f.project.value,
budget:f.budget.value,
message:f.message.value
}
).then(()=>{
f.style.display="none";
document.getElementById("success").style.display="block";
});

});

</script>

</body>
</html>
