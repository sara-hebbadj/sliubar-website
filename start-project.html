<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Start Your Project | SLIUBAR</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===== BACKGROUND ===== */
body{
font-family:'Inter',sans-serif;
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at 20% 20%,rgba(99,102,241,.18),transparent 40%),
radial-gradient(circle at 80% 10%,rgba(37,99,235,.15),transparent 40%),
#F8FAFC;
}

/* ===== CARD ===== */
.card{
width:540px;
max-width:92%;
padding:50px;
border-radius:26px;

background:rgba(255,255,255,.75);
backdrop-filter:blur(20px);

box-shadow:
0 40px 100px rgba(15,23,42,.12);
}

/* ===== HEADINGS ===== */
h2{
font-size:30px;
margin-bottom:10px;
letter-spacing:-.4px;
}

.subtitle{
color:#64748B;
margin-bottom:25px;
}

/* ===== INPUTS ===== */
input,select,textarea{
width:100%;
padding:16px;
margin-top:14px;

border-radius:14px;
border:1px solid #E2E8F0;

font-size:15px;
transition:.3s;
background:white;
}

input:focus,
select:focus,
textarea:focus{
outline:none;
border-color:#6366F1;
box-shadow:0 0 0 4px rgba(99,102,241,.15);
}

/* ===== STEPS ===== */
.step{display:none;}
.step.active{display:block;}

/* ===== BUTTONS ===== */
.buttons{
margin-top:35px;
display:flex;
justify-content:space-between;
}

button{
padding:14px 28px;
border-radius:999px;
border:none;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.next{
background:linear-gradient(90deg,#2563EB,#6366F1);
color:white;
box-shadow:0 15px 35px rgba(37,99,235,.25);
}

.next:hover{
transform:translateY(-2px);
}

.back{
background:#F1F5F9;
}

/* ===== SUCCESS ===== */
.success{
display:none;
text-align:center;
}

.success h2{
font-size:32px;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
emailjs.init("7H6amj8MZkwqkpdxf");
</script>

</head>

<body>

<div class="card">

<form id="projectForm">

<!-- STEP 1 -->
<div class="step active">
<h2>Tell us about you</h2>
<p class="subtitle">Let’s start with basic information.</p>

<input name="name" required placeholder="Full Name">
<input name="email" required type="email" placeholder="Email Address">
<input name="phone" required placeholder="Phone Number">

<div class="buttons">
<button type="button" class="next" onclick="next()">Continue</button>
</div>
</div>

<!-- STEP 2 -->
<div class="step">
<h2>Your project</h2>
<p class="subtitle">What are you looking to build?</p>

<input name="company" placeholder="Company / Brand">

<select name="project">
<option>Mobile Application</option>
<option>AI System</option>
<option>Automation Platform</option>
<option>Web Platform</option>
</select>

<div class="buttons">
<button type="button" class="back" onclick="prev()">Back</button>
<button type="button" class="next" onclick="next()">Continue</button>
</div>
</div>

<!-- STEP 3 -->
<div class="step">
<h2>Budget & vision</h2>

<select name="budget">
<option>15k–30k AED</option>
<option>30k–75k AED</option>
<option>75k–150k AED</option>
<option>150k+ AED</option>
</select>

<textarea name="message" rows="4"
placeholder="Describe your idea..."></textarea>

<div class="buttons">
<button type="button" class="back" onclick="prev()">Back</button>
<button type="submit" class="next">Submit Request</button>
</div>
</div>

</form>

<div class="success" id="success">
<h2>✓ Request Sent</h2>
<p>SLIUBAR will contact you shortly.</p>
</div>

</div>

<script>

let step=0;
const steps=document.querySelectorAll(".step");

function show(){
steps.forEach((s,i)=>s.classList.toggle("active",i===step));
}

function next(){step++;show();}
function prev(){step--;show();}

document.getElementById("projectForm")
.addEventListener("submit",e=>{

e.preventDefault();
const f=e.target;

emailjs.send(
"service_bojhf7q",
"template_mpnzyvl",
{
name:f.name.value,
email:f.email.value,
phone:f.phone.value,
company:f.company.value,
project:f.project.value,
budget:f.budget.value,
message:f.message.value
}
).then(()=>{
f.style.display="none";
document.getElementById("success").style.display="block";
});

});

</script>

</body>
</html>
