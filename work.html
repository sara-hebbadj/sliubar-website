<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<title>Selected Work | SLIUBAR</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */

:root{
--bg:#F8FAFC;
--surface:#FFFFFF;
--primary:#2563EB;
--accent:#6366F1;
--text:#0F172A;
--muted:#64748B;
--border:#E2E8F0;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.6;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
}

section{
padding:100px 0;
}

h1,h2,h3{
font-weight:700;
}

p{
color:var(--muted);
}

a{
text-decoration:none;
color:inherit;
}

/* ================= HEADER ================= */

header{
position:sticky;
top:0;
background:rgba(255,255,255,.8);
backdrop-filter:blur(18px);
border-bottom:1px solid var(--border);
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 0;
}

.logo{
font-weight:800;
letter-spacing:4px;
}

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
font-size:14px;
color:var(--muted);
}

.nav-links a:hover{
color:var(--text);
}

/* ================= HERO ================= */

.hero{
text-align:center;
padding-top:140px;
}

.hero h1{
font-size:3.5rem;
margin-bottom:20px;
}

.hero p{
max-width:650px;
margin:auto;
font-size:18px;
}

/* ================= PORTFOLIO ================= */

.portfolio{
margin-top:80px;
display:grid;
gap:50px;
}

.project{
background:white;
border-radius:20px;
border:1px solid var(--border);
overflow:hidden;
transition:.35s;
}

.project:hover{
transform:translateY(-6px);
box-shadow:0 25px 50px rgba(15,23,42,.08);
}

/* PROJECT IMAGE */

.project img{
width:100%;
display:block;
}

/* PROJECT INFO */

.project-content{
padding:30px;
}

.project-content h3{
margin-bottom:10px;
}

.project-link{
margin-top:15px;
display:inline-block;
color:var(--primary);
font-weight:600;
}

/* ================= GRID ================= */

@media(min-width:900px){

.portfolio{
grid-template-columns:1fr 1fr;
}

}

/* ================= MOBILE ================= */

@media(max-width:768px){

.hero h1{
font-size:2.3rem;
}

section{
padding:70px 0;
}

}

</style>
</head>

<body>

<header>
<div class="container">

<nav>

<div class="logo">SLIUBAR</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="work.html">Selected Work</a>
</div>

</nav>

</div>
</header>

<section class="hero">

<div class="container">

<h1>Selected Work</h1>

<p>
A selection of platforms, websites, and software systems engineered by SLIUBAR.
</p>

<div class="portfolio">

<!-- GYM BOOKING -->

<a href="https://sara-hebbadj.github.io/gym-booking-demo/" target="_blank" class="project">

<img src="demos/gym.png" alt="Gym booking platform">

<div class="project-content">

<h3>Gym Booking Platform</h3>



<span class="project-link">View Live Demo →</span>

</div>

</a>

<!-- CAFE WEBSITE -->

<a href="https://sara-hebbadj.github.io/cafe-website-demo/" target="_blank" class="project">

<img src="demos/cafe.png" alt="Cafe website">

<div class="project-content">

<h3>Café Website</h3>


<span class="project-link">View Live Demo →</span>

</div>

</a>

<!-- AI CHATBOT -->

<div class="project">

<img src="ai-project.png">

<div class="project-content">

<h3>AI Customer Assistant</h3>


<span class="project-link">Coming Soon</span>

</div>

</div>

<!-- REAL ESTATE DASHBOARD -->

<div class="project">

<img src="realestate-project.png">

<div class="project-content">

<h3>Real Estate Analytics Dashboard</h3>



<span class="project-link">Coming Soon</span>

</div>

</div>

</div>

</div>

</section>

</body>
</html>
