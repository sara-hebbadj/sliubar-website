<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Consultation | SLIUBAR</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:
radial-gradient(circle at 20% 20%, rgba(99,102,241,.12), transparent),
#F8FAFC;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#0F172A;
}

/* CARD */
.card{
width:520px;
background:white;
padding:45px;
border-radius:22px;
box-shadow:0 30px 80px rgba(0,0,0,.08);
}

/* PROGRESS */
.progress{
height:6px;
background:#E2E8F0;
border-radius:10px;
margin-bottom:30px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:33%;
background:linear-gradient(90deg,#2563EB,#6366F1);
transition:.4s;
}

.step{
display:none;
animation:fade .4s ease;
}

.step.active{
display:block;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

input,select{
width:100%;
padding:14px;
margin-top:15px;
border-radius:10px;
border:1px solid #E2E8F0;
}

.buttons{
margin-top:30px;
display:flex;
justify-content:space-between;
}

button{
padding:14px 26px;
border:none;
border-radius:40px;
cursor:pointer;
font-weight:600;
}

.next{
background:linear-gradient(90deg,#2563EB,#6366F1);
color:white;
}

.back{
background:#F1F5F9;
}

.calendar{
display:none;
margin-top:40px;
}

.calendly-inline-widget{
height:650px;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,.08);
}

</style>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
window.onload=function(){
emailjs.init("7H6amj8MZkwqkpdxf");
};
</script>

</head>

<body>

<div class="card">

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<form id="consultForm">

<!-- STEP 1 -->
<div class="step active">
<h2>About You</h2>

<input name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="tel" name="phone" placeholder="Phone Number" required>

<div class="buttons">
<button type="button" class="next" onclick="nextStep()">Next</button>
</div>
</div>

<!-- STEP 2 -->
<div class="step">
<h2>Your Business</h2>

<input name="company" placeholder="Company / Brand">

<select name="project" required>
<option value="">What do you want to discuss?</option>
<option>Mobile App</option>
<option>AI Solution</option>
<option>Automation</option>
<option>Web Platform</option>
<option>General Consultation</option>
</select>

<div class="buttons">
<button type="button" class="back" onclick="prevStep()">Back</button>
<button type="submit" class="next">Continue</button>
</div>
</div>

</form>

<!-- CALENDAR -->
<div class="calendar" id="calendarSection">

<h2>Select Available Time</h2>

<div
class="calendly-inline-widget"
data-url="https://calendly.com/sliubartech/sliubar-consultation">
</div>

</div>

</div>

<script>

let currentStep=0;
const steps=document.querySelectorAll(".step");
const progress=document.getElementById("progressBar");

function showStep(){
steps.forEach((s,i)=>{
s.classList.toggle("active",i===currentStep);
});
progress.style.width=((currentStep+1)/steps.length*100)+"%";
}

function nextStep(){
currentStep++;
showStep();
}

function prevStep(){
currentStep--;
showStep();
}

/* SEND INFO THEN SHOW CALENDAR */

document.getElementById("consultForm")
.addEventListener("submit",function(e){

e.preventDefault();

emailjs.sendForm(
"service_bojhf7q",
"template_mpnzyvl",
this
).then(()=>{

document.getElementById("consultForm").style.display="none";

document.getElementById("calendarSection").style.display="block";

document.getElementById("calendarSection")
.scrollIntoView({behavior:"smooth"});

});

});

</script>

<script src="https://assets.calendly.com/assets/external/widget.js" async></script>

</body>
</html>
