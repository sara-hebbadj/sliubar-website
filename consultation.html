<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Consultation | SLIUBAR</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:#F8FAFC;
margin:0;
color:#0F172A;
}

.container{
max-width:900px;
margin:auto;
padding:60px 20px;
text-align:center;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,.05);
margin-bottom:40px;
}

input,select{
width:100%;
padding:14px;
margin-top:15px;
border-radius:10px;
border:1px solid #E2E8F0;
font-size:15px;
}

button{
margin-top:25px;
width:100%;
padding:16px;
border:none;
border-radius:40px;
background:linear-gradient(90deg,#2563EB,#6366F1);
color:white;
font-weight:600;
cursor:pointer;
}

#calendarSection{
display:none;
margin-top:40px;
}

.calendly-inline-widget{
min-width:320px;
height:700px;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,.08);
}

</style>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
window.onload=function(){
emailjs.init("7H6amj8MZkwqkpdxf");
};
</script>

</head>

<body>

<div class="container">

<h1>Book a Consultation</h1>

<p>
Tell us briefly about your project before selecting a meeting time.
</p>

<div class="card">

<form id="consultForm">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="tel" name="phone" placeholder="Phone Number" required>

<input type="text" name="company" placeholder="Company / Brand">

<select name="project" required>
<option value="">Project Type</option>
<option>Mobile App</option>
<option>AI System</option>
<option>Web Platform</option>
<option>Automation</option>
</select>

<button type="submit">
Continue to Booking →
</button>

</form>

</div>

<!-- CALENDAR -->
<div id="calendarSection">

<h2>Select Available Time</h2>

<div
class="calendly-inline-widget"
data-url="https://calendly.com/sliubartech/sliubar-consultation">
</div>

</div>

</div>

<script>

document.getElementById("consultForm")
.addEventListener("submit",function(e){

e.preventDefault();

/* send info first */
emailjs.sendForm(
"service_bojhf7q",
"template_mpnzyvl",
this
).then(function(){

/* show calendar */
document.getElementById("calendarSection").style.display="block";

/* smooth scroll */
document.getElementById("calendarSection")
.scrollIntoView({behavior:"smooth"});

});

});

</script>

<script src="https://assets.calendly.com/assets/external/widget.js" async></script>

</body>
</html>
