<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Consultation | SLIUBAR</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:
radial-gradient(circle at 20% 20%, rgba(99,102,241,.12), transparent),
#F8FAFC;
margin:0;
color:#0F172A;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* CARD */
.card{
width:520px;
max-width:92%;
background:white;
padding:45px;
border-radius:22px;
box-shadow:0 30px 80px rgba(0,0,0,.08);
}

/* PROGRESS */
.progress{
height:6px;
background:#E2E8F0;
border-radius:10px;
margin-bottom:30px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:50%;
background:linear-gradient(90deg,#2563EB,#6366F1);
transition:.4s;
}

/* STEPS */
.step{display:none;}
.step.active{display:block;}

h2{margin-bottom:20px;}

input,select{
width:100%;
padding:14px;
margin-top:15px;
border-radius:10px;
border:1px solid #E2E8F0;
font-size:15px;
}

.buttons{
margin-top:30px;
display:flex;
justify-content:space-between;
}

button{
padding:14px 26px;
border:none;
border-radius:40px;
cursor:pointer;
font-weight:600;
}

.next{
background:linear-gradient(90deg,#2563EB,#6366F1);
color:white;
}

.back{
background:#F1F5F9;
}

.calendar{
display:none;
margin-top:40px;
}

.calendly-inline-widget{
height:650px;
border-radius:20px;
overflow:hidden;
}

.success{
text-align:center;
display:none;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
emailjs.init("7H6amj8MZkwqkpdxf");
</script>

</head>

<body>

<div class="card">

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<form id="consultForm">

<!-- STEP 1 -->
<div class="step active">
<h2>About You</h2>

<input name="name" required placeholder="Your Name">
<input name="email" type="email" required placeholder="Email">
<input name="phone" required placeholder="Phone Number">

<div class="buttons">
<button type="button" class="next" onclick="nextStep()">Next</button>
</div>
</div>

<!-- STEP 2 -->
<div class="step">
<h2>Consultation Details</h2>

<input name="company" placeholder="Company / Brand">

<select name="project" required>
<option value="">What would you like to discuss?</option>
<option>Mobile Application</option>
<option>AI System</option>
<option>Automation</option>
<option>Web Platform</option>
<option>General Consultation</option>
</select>

<div class="buttons">
<button type="button" class="back" onclick="prevStep()">Back</button>
<button type="submit" class="next" id="consultSubmit">
Continue
</button>
</div>
</div>

</form>

<!-- SUCCESS + CALENDAR -->
<div class="calendar" id="calendarSection">

<h2>Select Available Time</h2>

<div
class="calendly-inline-widget"
data-url="https://calendly.com/sliubartech/sliubar-consultation">
</div>

</div>

</div>

<script>

let currentStep=0;
const steps=document.querySelectorAll(".step");
const progress=document.getElementById("progressBar");

function showStep(){

steps.forEach((step,i)=>{

step.classList.toggle("active",i===currentStep);

/* MOBILE SAFE */
step.querySelectorAll("input,select")
.forEach(input=>{
i===currentStep
?input.removeAttribute("disabled")
:input.setAttribute("disabled","true");
});

});

progress.style.width=((currentStep+1)/steps.length*100)+"%";
}

function nextStep(){
currentStep++;
showStep();
}

function prevStep(){
currentStep--;
showStep();
}

showStep();

/* SUBMIT + SEND EMAIL */

document.getElementById("consultForm")
.addEventListener("submit",function(e){

e.preventDefault();

const btn=document.getElementById("consultSubmit");
btn.disabled=true;
btn.innerText="Sending...";

const f=this;

emailjs.send(
"service_bojhf7q",
"template_mpnzyvl",
{
name:f.name.value,
email:f.email.value,
phone:f.phone.value,
company:f.company.value,
project:f.project.value
}
).then(()=>{

f.style.display="none";
document.getElementById("calendarSection").style.display="block";

}).catch(()=>{
alert("Submission failed");
btn.disabled=false;
btn.innerText="Continue";
});

});

</script>

<script src="https://assets.calendly.com/assets/external/widget.js" async></script>

</body>
</html>
