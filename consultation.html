<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Consultation | SLIUBAR</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:#F8FAFC;
margin:0;
color:#0F172A;
}

.container{
max-width:600px;
margin:auto;
padding:60px 20px;
text-align:center;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,.05);
}

input{
width:100%;
padding:14px;
margin-top:15px;
border-radius:10px;
border:1px solid #E2E8F0;
font-size:15px;
}

button{
margin-top:25px;
width:100%;
padding:16px;
border:none;
border-radius:40px;
background:linear-gradient(90deg,#2563EB,#6366F1);
color:white;
font-weight:600;
cursor:pointer;
}

.success{
margin-top:20px;
color:green;
display:none;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
window.onload=function(){
emailjs.init("7H6amj8MZkwqkpdxf");
};
</script>

</head>

<body>

<div class="container">

<div class="card">

<h1>Book a Consultation</h1>

<p style="color:#64748B;">
Schedule a discussion about your business and technology needs.
</p>

<form id="consultForm">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="tel" name="phone" placeholder="Phone Number" required>

<label style="text-align:left;margin-top:20px;">Select Date</label>
<input type="date" name="date" required>

<label style="text-align:left;">Select Time</label>
<input type="time" name="time" required>

<button type="submit" id="submitBtn">
Request Consultation
</button>

</form>

<p id="successMessage" class="success">
✅ Consultation request sent!
</p>

<p style="margin-top:20px;">
or contact directly on  
<br><br>
<a href="https://wa.me/971547944719" target="_blank">
WhatsApp Us
</a>
</p>

</div>
</div>

<script>

const form=document.getElementById("consultForm");
const btn=document.getElementById("submitBtn");

form.addEventListener("submit",function(e){

e.preventDefault();

btn.disabled=true;
btn.innerText="Sending...";

emailjs.sendForm(
"service_bojhf7q",
"template_mpnzyvl",
this
).then(function(){

document.getElementById("successMessage").style.display="block";
form.reset();

btn.disabled=false;
btn.innerText="Request Consultation";

});

});

</script>

</body>
</html>
