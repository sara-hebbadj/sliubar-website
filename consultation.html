<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Consultation | SLIUBAR</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
background:#F8FAFC;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.card{
width:520px;
max-width:92%;
background:white;
padding:45px;
border-radius:22px;
box-shadow:0 30px 80px rgba(0,0,0,.08);
}

.step{display:none;}
.step.active{display:block;}

h2{font-size:28px;}

input,select{
width:100%;
padding:14px;
margin-top:15px;
border-radius:10px;
border:1px solid #E2E8F0;
}

button{
margin-top:25px;
padding:14px 26px;
border:none;
border-radius:40px;
background:linear-gradient(90deg,#2563EB,#6366F1);
color:white;
cursor:pointer;
}

.calendar{display:none;margin-top:40px;}
</style>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
emailjs.init("7H6amj8MZkwqkpdxf");
</script>

</head>

<body>

<div class="card">

<form id="consultForm">

<div class="step active">
<h2>About You</h2>
<input name="name" required placeholder="Name">
<input name="email" required placeholder="Email">
<input name="phone" required placeholder="Phone">

<button type="button" onclick="next()">Next</button>
</div>

<div class="step">
<h2>Your Business</h2>

<input name="company" placeholder="Company">

<select name="project">
<option>Consultation</option>
<option>Mobile App</option>
<option>AI System</option>
</select>

<button type="submit">Continue</button>
</div>

</form>

<div id="calendar" class="calendar">
<h2>Select Time</h2>

<div class="calendly-inline-widget"
data-url="https://calendly.com/sliubartech/sliubar-consultation"
style="height:650px;"></div>

</div>

</div>

<script>

let s=0;
const st=document.querySelectorAll(".step");

function show(){st.forEach((x,i)=>x.classList.toggle("active",i===s))}
function next(){s++;show();}

document.getElementById("consultForm")
.addEventListener("submit",e=>{

e.preventDefault();

const f=e.target;

emailjs.send(
"service_bojhf7q",
"template_mpnzyvl",
{
name:f.name.value,
email:f.email.value,
phone:f.phone.value,
company:f.company.value,
project:f.project.value
}
).then(()=>{
f.style.display="none";
document.getElementById("calendar").style.display="block";
});

});

</script>

<script src="https://assets.calendly.com/assets/external/widget.js" async></script>

</body>
</html>
